<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulpes Trader Dashboard 🦊</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Segoe UI', -apple-system, system-ui, sans-serif;
  background: #0d1117;
  color: #c9d1d9;
  font-size: 13px;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #161b22; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }

/* ===== Top Bar ===== */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  height: 44px;
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.logo { font-size: 18px; font-weight: 700; color: #58a6ff; }
.logo span { color: #f0883e; }
.status-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 12px;
  font-size: 12px; font-weight: 600;
}
.status-badge.running { background: #0b2e1a; color: #3fb950; border: 1px solid #3fb950; }
.status-badge.stopped { background: #2d0f0f; color: #f85149; border: 1px solid #f85149; }
.status-badge.error   { background: #2d0f0f; color: #f0883e; border: 1px solid #f0883e; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.running { background: #3fb950; box-shadow: 0 0 6px #3fb950; }
.dot.stopped { background: #f85149; }
.dot.error   { background: #f0883e; }

.mode-badge {
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.mode-badge.testnet { background: #1f2d1f; color: #7ee787; border: 1px solid #238636; }
.mode-badge.mainnet { background: #2d1f1f; color: #ffa657; border: 1px solid #9e6a03; }

.topbar-right { display: flex; align-items: center; gap: 16px; font-size: 12px; color: #8b949e; }
.stat-num { color: #c9d1d9; font-weight: 600; }
.cb-tripped { color: #f85149; font-weight: 700; }

/* ===== Main Content (explicit heights for reliability) ===== */
.main {
  height: calc(100vh - 44px - 120px);  /* viewport - topbar - log */
  overflow: hidden;
  background: #30363d;
}
.pnl-panel {
  height: 240px;
  background: #0d1117;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panels-row {
  display: flex;
  flex-direction: row;
  height: calc(100% - 242px);  /* main - pnl(with 1px gap) */
  overflow: hidden;
  gap: 1px;
  background: #30363d;
}
.panel {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panels-row .panel:first-child {
  width: 320px;
  flex-shrink: 0;
}
.panels-row .panel:last-child {
  width: 280px;
  flex-shrink: 0;
}
.panels-row .panel:nth-child(2) {
  flex: 1;
  min-width: 0;
}
.panel-header {
  padding: 8px 12px;
  font-size: 12px; font-weight: 600; text-transform: uppercase;
  color: #8b949e; letter-spacing: 0.5px;
  background: #161b22;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  min-height: 0;
}

/* ===== Position Tabs ===== */
.pos-tabs {
  display: flex;
  gap: 2px;
  font-size: 11px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.pos-tab {
  padding: 2px 10px;
  border-radius: 4px;
  cursor: pointer;
  color: #8b949e;
  background: #21262d;
  transition: all 0.15s;
}
.pos-tab:hover {
  color: #c9d1d9;
  background: #30363d;
}
.pos-tab.active {
  color: #58a6ff;
  background: #1f3a5f;
}

/* ===== History Item ===== */
.his-item {
  padding: 6px 8px;
  margin-bottom: 4px;
  background: #161b22;
  border-radius: 4px;
  font-size: 11px;
  border-left: 3px solid #30363d;
}
.his-item.win  { border-left-color: #3fb950; }
.his-item.loss { border-left-color: #f85149; }
.his-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
.his-label { color: #8b949e; }
.his-pnl.pos { color: #3fb950; font-weight: 600; }
.his-pnl.neg { color: #f85149; font-weight: 600; }
.his-reason {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  background: #21262d;
  color: #8b949e;
}

/* ===== Knowledge Base ===== */
.kb-item {
  padding: 7px 8px;
  margin-bottom: 5px;
  background: #161b22;
  border-radius: 5px;
  font-size: 11px;
  border-left: 3px solid #58a6ff;
}
.kb-item.whale   { border-left-color: #f0883e; }
.kb-item.market  { border-left-color: #58a6ff; }
.kb-item.signal  { border-left-color: #3fb950; }
.kb-item.risk    { border-left-color: #f85149; }
.kb-source {
  font-size: 10px;
  color: #8b949e;
  background: #21262d;
  padding: 1px 5px;
  border-radius: 3px;
}
.kb-tag {
  display: inline-block;
  font-size: 10px;
  padding: 1px 6px;
  margin: 1px 2px;
  border-radius: 8px;
  background: #1f3a5f;
  color: #58a6ff;
}

/* ===== PnL Panel (Binance style) ===== */
.pnl-panel {
  background: #0d1117;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.pnl-header-stats {
  display: flex;
  align-items: baseline;
  gap: 24px;
  padding: 12px 16px 4px;
  flex-shrink: 0;
}
.pnl-total-label {
  font-size: 12px;
  color: #8b949e;
  margin-bottom: 2px;
}
.pnl-total-amount {
  font-size: 28px;
  font-weight: 700;
  color: #e6edf3;
  letter-spacing: -0.5px;
}
.pnl-total-amount .currency {
  font-size: 16px;
  font-weight: 400;
  color: #8b949e;
  margin-left: 4px;
}
.pnl-daily-section {
  margin-left: 8px;
}
.pnl-daily-label {
  font-size: 12px;
  color: #8b949e;
}
.pnl-daily-value {
  font-size: 20px;
  font-weight: 700;
}
.pnl-daily-value.pos { color: #3fb950; }
.pnl-daily-value.neg { color: #f85149; }
.pnl-daily-pct {
  font-size: 14px;
  font-weight: 500;
  margin-left: 6px;
}
.pnl-daily-pct.pos { color: #3fb950; }
.pnl-daily-pct.neg { color: #f85149; }
/* Time selector */
.pnl-time-bar {
  display: flex;
  gap: 4px;
  padding: 4px 16px 0;
  flex-shrink: 0;
}
.pnl-time-btn {
  padding: 3px 14px;
  font-size: 12px;
  font-weight: 500;
  background: transparent;
  color: #8b949e;
  border: 1px solid #30363d;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
}
.pnl-time-btn:hover {
  background: #21262d;
  color: #c9d1d9;
}
.pnl-time-btn.active {
  background: #1f6feb;
  color: #fff;
  border-color: #1f6feb;
}
/* Chart area */
.pnl-chart-body {
  flex: 1;
  padding: 2px 12px 6px;
  position: relative;
}
.pnl-chart-body canvas {
  width: 100% !important;
  height: 100% !important;
}

/* ===== Positions ===== */
.pos-item {
  padding: 8px; margin-bottom: 6px;
  background: #161b22;
  border-radius: 6px;
  border-left: 3px solid #30363d;
}
.pos-item.long  { border-left-color: #3fb950; }
.pos-item.short { border-left-color: #f85149; }
.pos-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
.pos-label { color: #8b949e; font-size: 11px; }
.pos-value { font-weight: 600; font-size: 12px; }
.pos-pnl.positive { color: #3fb950; }
.pos-pnl.negative { color: #f85149; }
.entry-tag {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: #21262d; color: #8b949e;
}

/* ===== Signals ===== */
.sig-item {
  padding: 6px 8px; margin-bottom: 4px;
  display: flex; align-items: center; justify-content: space-between;
  background: #161b22;
  border-radius: 4px;
  font-size: 12px;
}
.sig-dir {
  font-weight: 700; padding: 1px 6px; border-radius: 3px;
}
.sig-dir.long  { background: #0b2e1a; color: #3fb950; }
.sig-dir.short { background: #2d0f0f; color: #f85149; }
.sig-dir.exit  { background: #2d1a0f; color: #f0883e; }
.sig-conf { color: #8b949e; font-size: 11px; }
.sig-time { color: #484f58; font-size: 10px; }
.sig-source { font-size: 10px; color: #58a6ff; }

/* ===== Risk Panel ===== */
.risk-item {
  display: flex; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid #21262d;
}
.risk-item:last-child { border-bottom: none; }
.risk-label { color: #8b949e; }
.risk-value { font-weight: 600; }
.risk-bar {
  width: 100%; height: 6px; background: #21262d;
  border-radius: 3px; margin-top: 8px; overflow: hidden;
}
.risk-bar-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.5s ease;
}
.risk-bar-fill.low    { background: #3fb950; }
.risk-bar-fill.medium { background: #f0883e; }
.risk-bar-fill.high   { background: #f85149; }

/* ===== Logs ===== */
.log-panel {
  height: 120px;
  background: #0d1117;
  border-top: 1px solid #30363d;
  display: flex;
  flex-direction: column;
}
.log-body {
  flex: 1; overflow-y: auto;
  padding: 4px 12px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.6;
}
.log-line { white-space: nowrap; }
.log-line .log-time { color: #484f58; }
.log-line.INFO    { color: #c9d1d9; }
.log-line.WARN    { color: #f0883e; }
.log-line.ERROR   { color: #f85149; }
.log-line.DEBUG   { color: #8b949e; }

/* ===== Empty State ===== */
.empty-state {
  display: flex; align-items: center; justify-content: center;
  height: 60px; color: #484f58; font-size: 12px;
}

/* ===== Connection ===== */
.conn-badge {
  padding: 2px 8px; border-radius: 4px;
  font-size: 11px;
}
.conn-badge.connected    { color: #3fb950; }
.conn-badge.disconnected { color: #f85149; }

/* ===== Responsive ===== */
@media (max-width: 900px) {
  .panels-row {
    flex-direction: column;
    height: auto;
  }
  .panels-row .panel:first-child,
  .panels-row .panel:last-child,
  .panels-row .panel:nth-child(2) {
    width: 100%;
  }
  .main {
    height: auto;
    min-height: calc(100vh - 44px - 120px);
  }
}
</style>
</head>
<body>

<!-- ===== Top Bar ===== -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Vulpes <span>Trader</span> 🦊</div>
    <span class="status-badge stopped" id="statusBadge"><span class="dot stopped"></span><span id="statusText">停止</span></span>
    <span class="mode-badge testnet" id="modeBadge">testnet</span>
  </div>
  <div class="topbar-right">
    <span>📊 交易: <span class="stat-num" id="tradeCount">0</span></span>
    <span>总 PnL: <span class="stat-num" id="totalPnl">0.00</span></span>
    <span>胜率: <span class="stat-num" id="winRate">0%</span></span>
    <span class="conn-badge disconnected" id="connBadge">🔌 未连接</span>
  </div>
</div>

<!-- ===== Main ===== -->
<div class="main">

  <!-- PnL Curve (Binance-style) - 置顶 -->
  <div class="pnl-panel">
    <div class="panel-header" style="border-bottom:none;padding-bottom:0;">📈 收益</div>
    <div class="pnl-header-stats">
      <div>
        <div class="pnl-total-label">总资产 (USDT)</div>
        <div class="pnl-total-amount" id="pnlTotalAssets">108,632.40<span class="currency">USDT</span></div>
      </div>
      <div class="pnl-daily-section">
        <div class="pnl-daily-label">今日盈亏</div>
        <div>
          <span class="pnl-daily-value pos" id="pnlDailyValue">+128.50</span>
          <span class="pnl-daily-pct pos" id="pnlDailyPct">(+1.25%)</span>
        </div>
      </div>
    </div>
    <div class="pnl-time-bar" id="pnlTimeBar">
      <button class="pnl-time-btn" data-range="1d">1天</button>
      <button class="pnl-time-btn" data-range="7d">7天</button>
      <button class="pnl-time-btn active" data-range="30d">30天</button>
      <button class="pnl-time-btn" data-range="180d">180天</button>
      <button class="pnl-time-btn" data-range="360d">360天</button>

    <div class="pnl-chart-body">
      <canvas id="pnlChart"></canvas>
    </div>
  </div>

  <div class="panels-row">
  <!-- Left: Positions -->
  <div class="panel">
    <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;">
      <span>📦 持仓</span>
      <div class="pos-tabs">
        <span class="pos-tab active" data-tab="current" id="tabCurrent">当前</span>
        <span class="pos-tab" data-tab="history" id="tabHistory">历史</span>
      </div>
    </div>
    <div class="panel-body" id="positionsPanel">

      <div id="posCurrentList"></div>

  <div class="panel">
    <div class="panel-header" style="display:flex;align-items:center;justify-content:space-between;">
      <span>📶 信号</span>
      <div class="pos-tabs" id="sigTabs">
        <span class="pos-tab active" data-tab="signals">信号</span>
        <span class="pos-tab" data-tab="knowledge">知识库</span>
      </div>
    </div>
    <div class="panel-body" id="signalsPanel">
      <div id="sigList"></div>
      <div id="kbList" style="display:none">
        <div class="empty-state">暂无知识</div>
      </div>
    </div>
  </div>

  <!-- Right: Risk -->
  <div class="panel">
    <div class="panel-header">⚠️ 风控</div>
    <div class="panel-body" id="riskPanel">
      <div class="risk-item"><span class="risk-label">熔断器</span><span class="risk-value" id="cbStatus">✅ 正常</span></div>
      <div class="risk-item"><span class="risk-label">最大杠杆</span><span class="risk-value" id="maxLev">20x</span></div>
      <div class="risk-item"><span class="risk-label">活跃持仓</span><span class="risk-value" id="actPos">0 / 5</span></div>
      <div class="risk-item"><span class="risk-label">当日亏损</span><span class="risk-value" id="dailyLoss">0.00</span></div>
      <div class="risk-item"><span class="risk-label">仓位使用率</span><span class="risk-value" id="usagePct">0%</span></div>
      <div class="risk-bar"><div class="risk-bar-fill low" id="usageBar" style="width:0%"></div></div>

</div>

<!-- ===== Logs ===== -->
<div class="log-panel">
  <div class="panel-header" style="cursor:pointer;" onclick="toggleLog()">
    📝 日志 <span style="color:#484f58;font-weight:400;" id="logCount">(0)</span>
  </div>
  <div class="log-body" id="logBody"></div>
</div>

<script>
// ==============================================================
// Dashboard 前端 — WebSocket 实时数据
// ==============================================================

const WS_URL = `ws://${location.host}/ws`;

// ---- State ----
let ws = null;
let reconnectTimer = null;
let reconnectAttempts = 0;
const MAX_RECONNECT_DELAY = 30000;

// ---- DOM ----
const $ = (id) => document.getElementById(id);

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
}

// ---- WebSocket ----
function connectWS() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    reconnectAttempts = 0;
    $('connBadge').textContent = '🔗 已连接';
    $('connBadge').className = 'conn-badge connected';
    // 拉取初始数据
    fetchAll();
    // 启动心跳
    heartbeat();
  };

  ws.onmessage = (evt) => {
    try {
      const msg = JSON.parse(evt.data);
      handleWSMessage(msg);
    } catch (e) {
      // ignore
    }
  };

  ws.onclose = () => {
    $('connBadge').textContent = '🔌 未连接';
    $('connBadge').className = 'conn-badge disconnected';
    scheduleReconnect();
  };

  ws.onerror = () => ws.close();
}

function scheduleReconnect() {
  if (reconnectTimer) clearTimeout(reconnectTimer);
  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), MAX_RECONNECT_DELAY);
  reconnectAttempts++;
  reconnectTimer = setTimeout(connectWS, delay);
}

function heartbeat() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send('ping');
  }
  setTimeout(heartbeat, 30000);
}

function handleWSMessage(msg) {
  switch (msg.type) {
    case 'pong': break;
    case 'status':   updateStatus(msg.data); break;
    case 'positions': updatePositions(msg.data); break;
    case 'signals':  updateSignals(msg.data); break;
    case 'log':      appendLog(msg.data); break;
    case 'performance': updatePerformance(msg.data); break;
    case 'risk':     updateRisk(msg.data); break;
    case 'pnl_update':
      if (msg.data && msg.data.metrics) {
        updatePnlMetrics(msg.data.metrics);
      }
      break;
    default: break;
  }
}

// ---- HTTP Fetch ----
async function fetchAll() {
  try {
    const [status, positions, perf, signals, config, tradeHistory, knowledge, pnlHistory] = await Promise.all([
      fetch('/api/status').then(r => r.json()),
      fetch('/api/positions').then(r => r.json()),
      fetch('/api/performance').then(r => r.json()),
      fetch('/api/signals').then(r => r.json()),
      fetch('/api/config').then(r => r.json()),
      fetch('/api/history').then(r => r.json()),
      fetch('/api/knowledge').then(r => r.json()),
      fetch('/api/pnl_history?range=' + _pnlCurrentRange).then(r => r.json()),
    ]);
    updateStatus(status);
    updatePositions(positions);
    updateHistory(tradeHistory);
    updateKnowledge(knowledge);
    updatePerformance(perf);
    updateSignals(signals);
    updateConfig(config);
    updatePnlChart(pnlHistory);
  } catch (e) {
    console.warn('Fetch initial data failed:', e);
  }
}

// ---- Update Functions ----

function updateStatus(data) {
  const status = data.status || 'stopped';
  const badge = $('statusBadge');
  const dot = badge.querySelector('.dot');
  const text = $('statusText');

  badge.className = 'status-badge ' + status;
  dot.className = 'dot ' + status;

  const labels = { running: '运行中', stopped: '已停止', error: '异常' };
  text.textContent = labels[status] || status;

  if (data.mode) {
    const mb = $('modeBadge');
    mb.textContent = data.mode;
    mb.className = 'mode-badge ' + data.mode;
  }

  if (data.circuit_breaker_tripped !== undefined) {
    updateRisk({
      circuit_breaker_tripped: data.circuit_breaker_tripped,
      max_leverage: data.max_leverage,
      active_positions: data.active_positions,
      max_positions: data.max_positions,
    });
  }
}

function updatePositions(positions) {
  const panel = document.getElementById('posCurrentList');
  const empty = document.getElementById('posEmpty');
  if (!panel) return;
  const count = Array.isArray(positions) ? positions.length : 0;

  if (!count) {
    panel.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  panel.innerHTML = '';
  positions.forEach(p => {
    const side = (p.side || '').toLowerCase();
    const pnl = parseFloat(p.pnl) || 0;
    const pnlCls = pnl >= 0 ? 'positive' : 'negative';

    const div = el('div', `pos-item ${side}`);
    div.innerHTML = `
      <div class="pos-row">
        <span class="pos-value">${p.symbol || '—'}</span>
        <span class="pos-pnl ${pnlCls}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">方向</span>
        <span class="pos-value" style="text-transform:uppercase">${side}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">数量</span>
        <span class="pos-value">${(p.size || p.quantity || 0).toFixed(4)}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">入场</span>
        <span class="pos-value">${p.entry_price ? p.entry_price.toFixed(2) : '—'}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">当前价</span>
        <span class="pos-value">${p.current_price ? p.current_price.toFixed(2) : '—'}</span>
      </div>
      <div class="pos-row">
        <span class="pos-label">杠杆</span>
        <span class="pos-value">${p.leverage || 1}x</span>
      </div>
    `;
    panel.appendChild(div);
  });
}

function updateSignals(signals) {
  const panel = document.getElementById('sigList');
  if (!panel) return;
  const list = Array.isArray(signals) ? signals : [];

  if (!list.length) {
    panel.innerHTML = '<div class="empty-state">暂无信号</div>';
    return;
  }

  panel.innerHTML = '';
  list.slice(0, 50).forEach(s => {
    const dir = (s.direction || '').toLowerCase();
    const conf = typeof s.confidence === 'number' ? (s.confidence * 100).toFixed(0) : '—';
    const source = s.source || '—';
    const ts = s.timestamp || s.time || '';

    let dirCls = '';
    if (dir.includes('long')) dirCls = 'long';
    else if (dir.includes('short')) dirCls = 'short';
    else if (dir.includes('exit')) dirCls = 'exit';

    const div = el('div', 'sig-item');
    div.innerHTML = `
      <div>
        <span class="sig-dir ${dirCls}">${dir.toUpperCase()}</span>
        <span class="sig-source">${source}</span>
      </div>
      <div>
        <span class="sig-conf">${conf}%</span>
        <span class="sig-time">${ts.slice(0, 19) || ''}</span>
      </div>
    `;
    panel.appendChild(div);
  });
}

function updatePerformance(data) {
  if (!data) return;
  const pnl = parseFloat(data.total_pnl) || 0;
  $('totalPnl').textContent = pnl >= 0 ? `+${pnl.toFixed(2)}` : pnl.toFixed(2);
  $('totalPnl').style.color = pnl >= 0 ? '#3fb950' : '#f85149';
  $('tradeCount').textContent = data.trade_count || 0;
  const wr = (data.win_rate || 0);
  $('winRate').textContent = typeof wr === 'number' ? `${(wr * 100).toFixed(0)}%` : `${wr}%`;
}

function updateRisk(data) {
  if (!data) return;
  $('cbStatus').textContent = data.circuit_breaker_tripped ? '🔴 熔断中' : '✅ 正常';
  $('cbStatus').style.color = data.circuit_breaker_tripped ? '#f85149' : '#3fb950';
  $('maxLev').textContent = (data.max_leverage || 20) + 'x';
  $('actPos').textContent = `${data.active_positions || 0} / ${data.max_positions || 5}`;
  $('dailyLoss').textContent = data.daily_loss !== undefined ? data.daily_loss.toFixed(2) : '0.00';

  const total = data.max_positions || 5;
  const active = data.active_positions || 0;
  const pct = total > 0 ? (active / total * 100) : 0;
  $('usagePct').textContent = pct.toFixed(0) + '%';
  const bar = $('usageBar');
  bar.style.width = pct + '%';
  bar.className = 'risk-bar-fill ' + (pct < 40 ? 'low' : pct < 70 ? 'medium' : 'high');
}

function updateConfig(data) {
  // 留作扩展
}

function appendLog(data) {
  const body = $('logBody');
  const level = data.level || 'INFO';
  const msg = data.message || '';
  const ts = (data.timestamp || '').slice(11, 19);
  const line = el('div', `log-line ${level}`);
  line.textContent = `[${ts}] [${level}] ${msg}`;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;

  const cnt = body.children.length;
  $('logCount').textContent = `(${cnt})`;
  if (cnt > 500) {
    while (body.children.length > 400) body.removeChild(body.firstChild);
  }
}

function toggleLog() {
  const body = $('logBody');
  const panel = body.closest('.log-panel');
  if (panel.style.display === 'none') {
    panel.style.display = 'flex';
  } else {
    panel.style.display = 'none';
  }
}

// ---- History Trade Tabs ----

let _historyCache = [];

function updateHistory(data) {
  _historyCache = Array.isArray(data) ? data : [];
  renderHistory();
}

function renderHistory() {
  const panel = document.getElementById('posHistoryList');
  if (!panel) return;

  if (!_historyCache.length) {
    panel.innerHTML = '<div class="empty-state">暂无历史成交</div>';
    return;
  }

  panel.innerHTML = '';
  _historyCache.forEach(t => {
    const pnl = parseFloat(t.pnl) || 0;
    const cls = pnl >= 0 ? 'win' : 'loss';
    const pnlCls = pnl >= 0 ? 'pos' : 'neg';
    const d = el('div', 'his-item ' + cls);
    const ts = (t.time || '').slice(0, 10);
    d.innerHTML = `
      <div class="his-row">
        <span><b>${t.symbol || '—'}</b> <span style="text-transform:uppercase;color:#8b949e;font-size:10px">${t.side || ''}</span></span>
        <span class="his-pnl ${pnlCls}">${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}</span>
      </div>
      <div class="his-row">
        <span class="his-label">${t.entry || '—'} → ${t.exit || '—'} x${t.leverage || 1}</span>
        <span><span class="his-reason">${t.reason || '—'}</span> <span style="color:#484f58;font-size:10px">${ts}</span></span>
      </div>
    `;
    panel.appendChild(d);
  });
}

// Position tab switching
document.addEventListener('DOMContentLoaded', () => {
  const tabCurrent = document.getElementById('tabCurrent');
  const tabHistory = document.getElementById('tabHistory');
  if (!tabCurrent || !tabHistory) return;

  function switchTab(tab) {
    const isHistory = tab === 'history';
    tabCurrent.classList.toggle('active', !isHistory);
    tabHistory.classList.toggle('active', isHistory);
    document.getElementById('posCurrentList').style.display = isHistory ? 'none' : '';
    document.getElementById('posHistoryList').style.display = isHistory ? '' : 'none';
    document.getElementById('posEmpty').style.display = 'none';

    if (isHistory && !document.getElementById('posHistoryList').children.length) {
      renderHistory();
    }
  }

  tabCurrent.addEventListener('click', () => switchTab('current'));
  tabHistory.addEventListener('click', () => switchTab('history'));
});

// ---- PnL Chart (Binance-style with axes) ----

let _pnlHistoryCache = [];
let _pnlCurrentRange = '30d';
let _pnlState = 'loading'; // 'loading' | 'empty' | 'error' | 'ready'

function updatePnlChart(data) {
  const canvas = document.getElementById('pnlChart');
  if (!canvas) return;

  if (!data || !data.points || !data.points.length) {
    _pnlState = 'empty';
    _pnlHistoryCache = [];
    if (data && data.metrics) updatePnlMetrics(data.metrics);
    drawPnlState('empty');
    return;
  }
  _pnlState = 'ready';
  _pnlHistoryCache = data.points;
  if (data.metrics) updatePnlMetrics(data.metrics);
  drawPnlCurve(_pnlHistoryCache);
}

function updatePnlMetrics(metrics) {
  if (!metrics) return;

  const ta = parseFloat(metrics.total_assets) || 0;
  $('pnlTotalAssets').innerHTML = ta.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}) + '<span class="currency">USDT</span>';

  const dp = parseFloat(metrics.daily) || 0;
  const dpEl = $('pnlDailyValue');
  dpEl.textContent = (dp >= 0 ? '+' : '') + dp.toFixed(2);
  dpEl.className = 'pnl-daily-value ' + (dp >= 0 ? 'pos' : 'neg');

  const dpp = parseFloat(metrics.daily_pct) || 0;
  const dppEl = $('pnlDailyPct');
  dppEl.textContent = (dpp >= 0 ? '(+' : '(') + dpp.toFixed(2) + '%)';
  dppEl.className = 'pnl-daily-pct ' + (dpp >= 0 ? 'pos' : 'neg');
}

function drawPnlState(state) {
  const canvas = document.getElementById('pnlChart');
  if (!canvas) return;

  const parent = canvas.parentElement;
  const rect = parent.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(rect.width || 400, 100);
  const h = Math.max(rect.height || 140, 60);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  ctx.fillStyle = '#484f58';
  ctx.font = '13px "Segoe UI", -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const messages = {
    loading: '加载中...',
    empty: '暂无收益数据',
    error: '加载失败，点击重试',
  };
  ctx.fillText(messages[state] || '', w / 2, h / 2);
}

function drawPnlCurve(points) {
  const canvas = document.getElementById('pnlChart');
  if (!canvas) return;

  const parent = canvas.parentElement;
  const rect = parent.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(rect.width || 400, 100);
  const h = Math.max(rect.height || 140, 60);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  if (points.length < 2) {
    drawPnlState('empty');
    return;
  }

  const values = points.map(p => (typeof p === 'number' ? p : (p.value || p.pnl || 0)));
  const min = Math.min(...values);
  const max = Math.max(...values);
  const vRange = max - min || 1;
  const isUp = values[values.length - 1] >= values[0];

  // Padding
  const padL = 62, padR = 14, padT = 8, padB = 26;
  const chartW = w - padL - padR;
  const chartH = h - padT - padB;

  // ---- Y-axis grid lines & labels ----
  const yGridCount = 5;
  for (let i = 0; i <= yGridCount; i++) {
    const y = padT + (chartH / yGridCount) * i;
    const val = max - (vRange / yGridCount) * i;

    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();

    ctx.fillStyle = '#484f58';
    ctx.font = '10px "Segoe UI", -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(formatYAxisValue(val), padL - 8, y);
  }

  // ---- X-axis labels ----
  ctx.fillStyle = '#484f58';
  ctx.font = '10px "Segoe UI", -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';

  const xLabelCount = 5;
  for (let i = 0; i <= xLabelCount; i++) {
    const x = padL + (chartW / xLabelCount) * i;
    const idx = Math.min(Math.floor((points.length - 1) / xLabelCount * i), points.length - 1);
    const p = points[idx];
    const rawTime = p && (p.time || p.t || '');
    const label = rawTime ? formatXAxisTime(rawTime, _pnlCurrentRange) : formatTimeLabel(idx, _pnlCurrentRange, points.length);
    ctx.fillText(label, x, h - padB + 6);
  }

  // ---- Zero line ----
  if (min < 0 && max > 0) {
    const zeroY = padT + chartH * (max / vRange);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, zeroY);
    ctx.lineTo(w - padR, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ---- Gradient fill ----
  const gradient = ctx.createLinearGradient(0, padT, 0, h - padB);
  gradient.addColorStop(0, isUp ? 'rgba(63, 185, 80, 0.20)' : 'rgba(248, 81, 73, 0.20)');
  gradient.addColorStop(0.5, isUp ? 'rgba(63, 185, 80, 0.06)' : 'rgba(248, 81, 73, 0.06)');
  gradient.addColorStop(1, isUp ? 'rgba(63, 185, 80, 0.01)' : 'rgba(248, 81, 73, 0.01)');

  const stepX = chartW / Math.max(points.length - 1, 1);
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = padL + i * stepX;
    const y = padT + chartH * (1 - (v - min) / vRange);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(padL + (values.length - 1) * stepX, h - padB);
  ctx.lineTo(padL, h - padB);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // ---- Line ----
  ctx.beginPath();
  ctx.strokeStyle = isUp ? '#3fb950' : '#f85149';
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.lineCap = 'round';
  values.forEach((v, i) => {
    const x = padL + i * stepX;
    const y = padT + chartH * (1 - (v - min) / vRange);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // ---- Last value dot ----
  const lastV = values[values.length - 1];
  const lx = padL + (values.length - 1) * stepX;
  const ly = padT + chartH * (1 - (lastV - min) / vRange);

  ctx.beginPath();
  ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = isUp ? '#3fb950' : '#f85149';
  ctx.fill();
  ctx.strokeStyle = '#0d1117';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function formatYAxisValue(val) {
  const abs = Math.abs(val);
  if (abs >= 1000000) return (val / 1000000).toFixed(1) + 'M';
  if (abs >= 1000) return (val / 1000).toFixed(1) + 'k';
  return val.toFixed(0);
}

function formatXAxisTime(isoStr, range) {
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return isoStr;

  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const hh = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');

  switch (range) {
    case '1d':
      return hh + ':' + mi;
    case '7d':
      return mm + '/' + dd + ' ' + hh + ':00';
    case '30d':
      return mm + '/' + dd;
    case '180d':
    case '360d':
      return d.getFullYear() + '/' + mm;
    default:
      return mm + '/' + dd;
  }
}

function formatTimeLabel(idx, range, total) {
  switch (range) {
    case '1d': {
      const hour = Math.floor(idx / (total / 24));
      return String(hour).padStart(2, '0') + ':00';
    }
    case '7d': {
      const day = Math.floor(idx / (total / 7));
      return 'D' + (day + 1);
    }
    case '30d': {
      const day = Math.floor(idx / (total / 30));
      return 'D' + (day + 1);
    }
    case '180d': {
      const month = Math.floor(idx / (total / 6));
      return 'M' + (month + 1);
    }
    case '360d': {
      const month = Math.floor(idx / (total / 12));
      return 'M' + (month + 1);
    }
    default:
      return String(idx);
  }
}

// ---- Time selector ----
document.addEventListener('DOMContentLoaded', () => {
  const bar = document.getElementById('pnlTimeBar');
  if (!bar) return;
  bar.addEventListener('click', async (e) => {
    const btn = e.target.closest('.pnl-time-btn');
    if (!btn) return;

    bar.querySelectorAll('.pnl-time-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    _pnlCurrentRange = btn.dataset.range;
    _pnlState = 'loading';
    drawPnlState('loading');

    try {
      const resp = await fetch('/api/pnl_history?range=' + _pnlCurrentRange);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();
      updatePnlChart(data);
    } catch (e) {
      console.warn('Fetch pnl_history failed:', e);
      _pnlState = 'error';
      drawPnlState('error');
    }
  });
});

// Redraw on resize
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (_pnlState === 'ready' && _pnlHistoryCache.length) {
      drawPnlCurve(_pnlHistoryCache);
    } else {
      drawPnlState(_pnlState);
    }
  }, 200);
});

// ---- Init ----
document.addEventListener('DOMContentLoaded', () => {
  connectWS();
  // 每5秒轮询 REST 端作为备胎
  setInterval(fetchAll, 5000);
});
